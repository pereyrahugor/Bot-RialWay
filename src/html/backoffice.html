<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>🤖 {{BOT_NAME}} - Backoffice</title>
    <link rel="stylesheet" href="/style/backoffice.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <h2 style="margin:0; font-size:1.4rem;">{{BOT_NAME}}</h2>
            <div style="display:flex; gap:8px;">
                <button class="btn-icon" onclick="toggleTagManager()" title="Gestión Etiquetas"><i class="fas fa-tags"></i></button>
                <button class="btn-icon" onclick="logout()" title="Cerrar Sesión"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>

        <div class="search-container">
            <div class="search-wrapper">
                <i class="fas fa-search" style="color:var(--wa-text-secondary); font-size: 0.8rem;"></i>
                <input type="text" id="search-input" class="search-input" placeholder="Buscar chat por ID o etiqueta..." oninput="handleSearch()">
            </div>
            <select id="filter-tag" class="search-input" style="background:var(--wa-search-bg); border-radius:8px; width:100%; border:none; margin-top:2px;" onchange="handleSearch()">
                <option value="">Todas las etiquetas</option>
            </select>
        </div>

        <div id="chat-list">
            <!-- Cargando chats... -->
        </div>
    </div>

    <div id="main-content">
        <div id="chat-header">
            <div class="header-user">
                <div class="chat-avatar" id="active-chat-avatar"></div>
                <div>
                    <div style="font-weight:600;" id="active-chat-phone">Seleccione un chat</div>
                    <div style="font-size:0.8rem; color:var(--wa-text-secondary);" id="active-chat-name"></div>
                    <div id="active-chat-tags" style="display:flex; gap:4px; margin-top:2px;"></div>
                </div>
            </div>

            <div class="switch-container">
                <span id="bot-status-text">Sin chat seleccionado</span>
                <label class="switch">
                    <input type="checkbox" id="bot-toggle" disabled onchange="toggleBot(this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div id="messages">
            <div style="flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; opacity:0.3;">
                <i class="fas fa-comments" style="font-size:5rem; margin-bottom:1rem;"></i>
                <h2>Bienvenido al panel de control</h2>
                <p>Selecciona un chat a la izquierda para comenzar.</p>
            </div>
        </div>

        <div id="input-area">
            <button class="btn-icon" id="attach-btn" title="Adjuntar archivo" disabled onclick="document.getElementById('file-input').click()">
                <i class="fas fa-paperclip"></i>
            </button>
            <input type="file" id="file-input" style="display:none;" onchange="handleFileSelect(this)">
            
            <div class="input-wrapper">
                <input type="text" id="message-input" placeholder="Escribe un mensaje aquí" disabled
                       onkeydown="if(event.key === 'Enter') sendMessage()">
            </div>
            
            <button class="btn-icon" id="send-btn" title="Enviar mensaje" onclick="sendMessage()" disabled>
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- Panel de gestión de etiquetas -->
    <div id="tag-manager">
        <div class="tag-manager-header">
            <button class="btn-icon" onclick="toggleTagManager()"><i class="fas fa-arrow-left"></i></button>
            <h3 style="margin:0;">Etiquetas del Bot</h3>
        </div>
        <div class="tag-manager-content">
            <div style="margin-bottom:20px;">
                <h4 style="margin:0 0 10px 0;">Crear Etiqueta</h4>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="new-tag-name" class="search-input" style="background:#202c33; border-radius:8px;" placeholder="Ej: interesado">
                    <input type="color" id="new-tag-color" value="#6366f1" style="height:35px; width:35px; border:none; background:none;">
                    <button class="btn-icon" onclick="createTag()"><i class="fas fa-plus"></i></button>
                </div>
            </div>

            <h4 style="margin:0 0 10px 0;">Lista de Etiquetas</h4>
            <div id="tag-list-editor"></div>

            <div id="current-chat-tags-section" style="margin-top:30px; display:none;">
                <h4 style="margin:0 0 10px 0;">Asignar a este chat</h4>
                <div id="available-tags-to-assign" style="display:flex; flex-wrap:wrap; gap:8px;"></div>
            </div>
        </div>
    </div>

    <script src="/js/backoffice.js"></script>
</body>
</html>
