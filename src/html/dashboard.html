<!DOCTYPE html>
<html lang="es">
<head>
    <script src="/js/auth-check.js"></script>
    <meta charset="UTF-8">
    <title>KPI Dashboard - {{BOT_NAME}}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/style/crm-common.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .kpi-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .kpi-card {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .kpi-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .kpi-value { font-size: 2.2rem; font-weight: 700; color: var(--primary); margin: 10px 0; }
        .kpi-label { color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .kpi-icon { font-size: 1.4rem; color: var(--accent); margin-bottom: 12px; opacity: 0.8; }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }
        .chart-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }
        .chart-header { margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .chart-header i { color: var(--accent); }
        
        @media (max-width: 768px) {
            .charts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body data-theme="light">
    <!-- Navbar -->
    <div id="navbar">
        <div class="nav-item {{SHOW_BACKOFFICE_STYLE}}" title="Conversaciones" onclick="window.location.href='/backoffice'"><i class="fas fa-comment-dots"></i></div>
        <div class="nav-item active" title="Dashboard" onclick="window.location.href='/dashboard'"><i class="fas fa-chart-line"></i></div>
        <div class="nav-item" title="Conexión" onclick="window.location.href='/conexion'"><i class="fas fa-qrcode"></i></div>
        <div class="nav-item" title="Webchat" onclick="window.location.href='/webchat'"><i class="fas fa-desktop"></i></div>
        <div class="nav-item {{SHOW_CRM_STYLE}}" title="CRM" onclick="window.location.href='/crm'"><i class="fas fa-user-friends"></i></div>
        
        <div class="nav-item badge-container {{SHOW_BACKOFFICE_STYLE}}" title="Contactos" onclick="toggleLeadsPanel(event)">
            <i class="fas fa-address-book"></i>
        </div>
        <div class="nav-item badge-container {{SHOW_BACKOFFICE_STYLE}}" title="Tickets Pendientes" onclick="toggleTicketsPanel(event)">
            <i class="fas fa-ticket-alt"></i>
            <span class="badge" id="tickets-badge" style="display:none;">0</span>
        </div>
        <div class="nav-item" title="Configuración" onclick="window.location.href='/system-config'"><i class="fas fa-cog"></i></div>
        
        <div style="flex:1"></div>

        <div class="nav-item" title="Coexistencia Meta" id="nav-meta-btn" onclick="toggleMetaPanel(event)" style="color: #0668E1; font-size: 1.4rem;">
            <i class="fas fa-infinity"></i>
        </div>
        <div class="nav-item" id="theme-toggle" title="Cambiar Tema" style="margin-bottom: 10px;"><i class="fas fa-moon"></i></div>
        <div class="nav-item" onclick="logout()" title="Cerrar Sesión" style="color:#f87171;"><i class="fas fa-sign-out-alt"></i></div>
    </div>

    <div class="crm-main-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h1 class="animate-fade">📊 Dashboard de Performance</h1>
            <div id="last-update" style="font-size: 0.8rem; opacity: 0.5;"></div>
        </div>
        <p style="opacity:0.7; margin-bottom: 30px;">Análisis detallado de métricas y efectividad del Bot {{BOT_NAME}}</p>
    
        <div class="kpi-container">
            <div class="kpi-card">
                <div class="kpi-icon"><i class="fas fa-percentage"></i></div>
                <div class="kpi-label">Conversión Leads</div>
                <div class="kpi-value" id="kpi-conversion">--%</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-icon"><i class="fas fa-paper-plane"></i></div>
                <div class="kpi-label">Msjs (24h)</div>
                <div class="kpi-value" id="kpi-msgs">--</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-icon"><i class="fas fa-robot"></i></div>
                <div class="kpi-label">Proactividad Bot</div>
                <div class="kpi-value" id="kpi-bot">--%</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-icon"><i class="fas fa-bolt"></i></div>
                <div class="kpi-label">T. Respuesta</div>
                <div class="kpi-value" id="kpi-resp">--m</div>
            </div>
        </div>

        <div class="charts-grid">
            <!-- Gráfico Funnel -->
            <div class="chart-card">
                <div class="chart-header"><i class="fas fa-filter"></i> <h3>Estado del Funnel (Tickets)</h3></div>
                <div style="height: 300px;"><canvas id="chart-funnel"></canvas></div>
            </div>
            <!-- Gráfico Categorías -->
            <div class="chart-card">
                <div class="chart-header"><i class="fas fa-shapes"></i> <h3>Categorización de Consultas</h3></div>
                <div style="height: 300px;"><canvas id="chart-categories"></canvas></div>
            </div>
            <!-- Productividad Operadores -->
            <div class="chart-card">
                <div class="chart-header"><i class="fas fa-user-edit"></i> <h3>Acciones por Operador (7d)</h3></div>
                <div style="height: 300px;"><canvas id="chart-productivity"></canvas></div>
            </div>
            <!-- Origen de Leads -->
            <div class="chart-card">
                <div class="chart-header"><i class="fas fa-share-nodes"></i> <h3>Origen de Contactos</h3></div>
                <div style="height: 300px;"><canvas id="chart-sources"></canvas></div>
            </div>
        </div>
    </div>

    <script src="/js/crm-common.js"></script>
    <script>
        const token = localStorage.getItem('backoffice_token');
        let charts = {};

        async function initDashboard() {
            try {
                const res = await fetch(`/api/dashboard/stats?token=${token}`);
                const data = await res.json();
                if (!data.success) throw new Error(data.error);

                renderStats(data.stats);
            } catch (e) {
                console.error('Error cargando KPIs:', e);
            }
        }

        function renderStats(stats) {
            // KPIs Simples
            document.getElementById('kpi-conversion').textContent = stats.conversionRate + '%';
            document.getElementById('kpi-msgs').textContent = stats.msgCountLast24h;
            document.getElementById('kpi-bot').textContent = stats.proactivity + '%';
            document.getElementById('kpi-resp').textContent = stats.avgResponseTime + 'm';
            document.getElementById('last-update').textContent = 'Última actualización: ' + new Date().toLocaleTimeString();

            // Gráfico Funnel (Doughnut)
            createChart('chart-funnel', 'doughnut', stats.funnel, ['#10b981', '#f59e0b', '#ef4444']);
            
            // Categorías (Bar)
            createChart('chart-categories', 'bar', stats.categories, ['#6366f1']);
            
            // Productividad (Pie)
            createChart('chart-productivity', 'pie', stats.productivity);
            
            // Fuentes (PolarArea)
            createChart('chart-sources', 'polarArea', stats.sources);
        }

        function createChart(id, type, dataMap, colors = []) {
            if (charts[id]) charts[id].destroy();
            
            const ctx = document.getElementById(id).getContext('2d');
            const labels = Object.keys(dataMap || {});
            const values = Object.values(dataMap || {});
            
            const backgroundColors = colors.length > 0 ? colors : [
                '#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4'
            ];

            charts[id] = new Chart(ctx, {
                type: type,
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: backgroundColors,
                        borderWidth: 0,
                        hoverOffset: 15
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { usePointStyle: true, font: { family: 'Outfit', size: 12 } } }
                    },
                    scales: type === 'bar' ? {
                        y: { beginAtZero: true, grid: { display: false } },
                        x: { grid: { display: false } }
                    } : {}
                }
            });
        }

        initDashboard();
        setInterval(initDashboard, 60000); // Actualizar cada minuto
    </script>
</body>
</html>
