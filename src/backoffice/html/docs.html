<!DOCTYPE html>
<html lang="es">
<head>
    <script src="/js/auth-check.js"></script>
    <meta charset="UTF-8">
    <title>Manual de Usuario | {{BOT_NAME}}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/style/crm-common.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; display: flex; height: 100vh; background: var(--bg-main); overflow: hidden; }
        .docs-container { flex: 1; overflow-y: auto; padding: 40px; position: relative; }
        .docs-card { 
            background: var(--bg-card); 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 60px; 
            border-radius: 24px; 
            box-shadow: 0 4px 30px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            line-height: 1.7;
        }
        .doc-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 2px solid var(--border); padding-bottom: 20px; }
        .doc-content { color: var(--text-main); }
        .doc-content h1 { color: var(--accent); margin-bottom: 1.5rem; font-size: 2.2rem; }
        .doc-content h2 { color: var(--accent); margin-top: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
        .doc-content code { background: rgba(0,0,0,0.05); padding: 2px 6px; border-radius: 4px; font-family: monospace; }
        .doc-content pre { background: #1e293b; color: #f1f5f9; padding: 20px; border-radius: 12px; overflow-x: auto; margin: 15px 0; }
        .doc-content blockquote { border-left: 5px solid var(--accent); padding-left: 20px; color: var(--text-muted); font-style: italic; margin: 20px 0; }
        .btn-print { background: var(--accent); color: white; padding: 12px 24px; border-radius: 12px; border: none; cursor: pointer; font-weight: 700; transition: all 0.2s; display: flex; align-items: center; gap: 10px; }
        .btn-print:hover { transform: translateY(-2px); filter: brightness(1.1); }
        
        @media print {
            #navbar, .btn-print, .doc-header { display: none !important; }
            body { background: white !important; height: auto !important; overflow: visible !important; }
            .docs-container { padding: 0 !important; overflow: visible !important; }
            .docs-card { box-shadow: none !important; border: none !important; padding: 0 !important; width: 100% !important; max-width: 100% !important; margin: 0 !important; }
            .doc-content h1 { font-size: 24pt !important; }
            .doc-content h2 { font-size: 18pt !important; }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <div id="navbar">
        <div class="nav-item {{SHOW_BACKOFFICE_STYLE}}" title="Conversaciones" onclick="window.location.href='/backoffice'"><i class="fas fa-comment-dots"></i></div>
        <div class="nav-item" title="Dashboard" onclick="window.location.href='/dashboard'"><i class="fas fa-chart-line"></i></div>
        <div class="nav-item" title="CRM" onclick="window.location.href='/crm'"><i class="fas fa-user-friends"></i></div>
        <div class="nav-item active" title="Manual" onclick="window.location.href='/documentacion'"><i class="fas fa-book"></i></div>
        <div style="flex:1"></div>
        <div class="nav-item" onclick="logout()" title="Cerrar Sesión" style="color:#f87171;"><i class="fas fa-sign-out-alt"></i></div>
    </div>

    <div class="docs-container wrapper">
        <div class="docs-card animate-fade">
            <div class="doc-header">
                <div>
                  <h1 style="margin:0; font-size:1.8rem;">📘 Centro de Ayuda</h1>
                  <p style="color:var(--text-muted); margin:0;">Guía operacional de {{BOT_NAME}}</p>
                </div>
                <button class="btn-print" onclick="window.print()">
                    <i class="fas fa-file-pdf"></i> Guardar PDF
                </button>
            </div>
            
            <div id="content" class="doc-content">
                Cargando manual de usuario...
            </div>
        </div>
    </div>

    <script>
        const activeToken = localStorage.getItem('backoffice_token');
        if (!activeToken) window.location.href = '/login';

        async function loadDocs() {
            try {
                const response = await fetch('/api/backoffice/get-docs?token=' + activeToken);
                const data = await response.json();
                if (data.success) {
                    document.getElementById('content').innerHTML = marked.parse(data.content);
                } else {
                    document.getElementById('content').innerHTML = '<div style="color:red">Error: ' + data.error + '</div>';
                }
            } catch (err) {
                document.getElementById('content').innerHTML = '<div style="color:red">Error de conexión con el servidor de documentación.</div>';
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/login';
        }

        document.addEventListener('DOMContentLoaded', loadDocs);
    </script>
</body>
</html>
