<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Backoffice - {{BOT_NAME}}</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style/crm-common.css">
    <link rel="stylesheet" href="/style/login.css">
</head>
<body data-theme="light">
    <script src="/js/crm-common.js"></script>
    <div class="login-card">
        <h1>{{BOT_NAME}} Bot</h1>
        <p>Inicia sesión en el panel</p>
        <div style="text-align: left; width: 100%;">
            <label style="font-size: 0.8rem; opacity: 0.7; margin-left: 5px;">Usuario</label>
            <input type="text" id="user" placeholder="Usuario" autofocus style="margin-bottom: 15px;">
            <label style="font-size: 0.8rem; opacity: 0.7; margin-left: 5px;">Contraseña</label>
            <input type="password" id="pass" placeholder="Contraseña">
        </div>
        <button onclick="login()" style="margin-top: 20px;">Entrar al Sistema</button>
        <div id="error" class="error">Credenciales inválidas.</div>
    </div>

    <script src="/js/login.js"></script>
</body>
</html>
